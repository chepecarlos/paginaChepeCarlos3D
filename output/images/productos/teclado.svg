    <rect x="194" y="232" width="30" height="28" rx="4"/>
    <rect x="230" y="232" width="30" height="28" rx="4"/>
    <rect x="266" y="232" width="30" height="28" rx="4"/>
    <rect x="302" y="232" width="30" height="28" rx="4"/>
