<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="40%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#14532d"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Pie / base-->
  <rect x="265" y="338" width="70" height="12" rx="4" fill="#334155"/>
  <!-- Cuello -->
  <rect x="288" y="300" width="24" height="42" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Base pie -->
  <rect x="220" y="348" width="160" height="14" rx="7" fill="#1e293b" stroke="#475569" stroke-width="1"/>

  <!-- Marco del monitor (bezel) -->
  <rect x="70" y="60" width="460" height="250" rx="16" fill="url(#bezel)" stroke="#475569" stroke-width="2"/>

  <!-- Curva sutil del panel (efecto curvo) -->
  <path d="M75,65 Q300,56 525,65 L525,305 Q300,314 75,305 Z" fill="#0f172a" rx="12"/>

  <!-- Pantalla (contenido) -->
  <clipPath id="screen-clip">
    <path d="M80,70 Q300,62 520,70 L520,300 Q300,308 80,300 Z"/>
  </clipPath>
  <rect x="80" y="70" width="440" height="230" fill="url(#screen)" clip-path="url(#screen-clip)"/>

  <!-- Contenido de pantalla: skyline abstracto -->
  <g clip-path="url(#screen-clip)" opacity="0.5">
    <rect x="100" y="200" width="30" height="100" fill="#22d3ee" opacity="0.3"/>
    <rect x="140" y="170" width="25" height="130" fill="#22d3ee" opacity="0.25"/>
    <rect x="175" y="220" width="20" height="80" fill="#22d3ee" opacity="0.2"/>
    <rect x="205" y="150" width="35" height="150" fill="#22d3ee" opacity="0.3"/>
    <rect x="350" y="210" width="30" height="90" fill="#4ade80" opacity="0.25"/>
    <rect x="390" y="180" width="25" height="120" fill="#4ade80" opacity="0.3"/>
    <rect x="425" y="200" width="40" height="100" fill="#4ade80" opacity="0.2"/>
    <rect x="475" y="160" width="30" height="140" fill="#4ade80" opacity="0.3"/>
  </g>

  <!-- Línea horizontal de "luz" en la pantalla -->
  <line x1="80" y1="185" x2="520" y2="185" stroke="white" stroke-width="0.5" opacity="0.15" clip-path="url(#screen-clip)"/>

  <!-- Logo/marca en pantalla -->
  <text x="300" y="200" font-family="system-ui, sans-serif" font-size="28" font-weight="800"
        fill="white" text-anchor="middle" opacity="0.9" letter-spacing="-1">27" QHD</text>
  <text x="300" y="228" font-family="system-ui, sans-serif" font-size="14"
        fill="#94a3b8" text-anchor="middle" opacity="0.8" letter-spacing="4">144 Hz  ·  1 ms</text>

  <!-- LED indicador -->
  <circle cx="300" cy="302" r="4" fill="#4ade80" opacity="0.9"/>

  <!-- Botones en bezel inferior -->
  <rect x="470" y="295" width="8" height="8" rx="2" fill="#64748b"/>
  <rect x="484" y="295" width="8" height="8" rx="2" fill="#64748b"/>
  <rect x="498" y="295" width="8" height="8" rx="2" fill="#64748b"/>

  <!-- Etiqueta -->
  <text x="300" y="385" font-family="system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle" letter-spacing="3">MONITOR CURVO 27" 144Hz</text>
</svg>
