<!doctype html>
<html lang="{{ DEFAULT_LANG }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{% block description %}{% endblock %}" />
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css" />
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <header id="site-header">
      <div class="container">
        <a href="{{ SITEURL }}/" class="brand">{{ SITENAME }}</a>
        <nav id="main-nav">
          <ul>
            <li><a href="{{ SITEURL }}/">Inicio</a></li>
            <li><a href="{{ SITEURL }}/catalogo/">Catálogo</a></li>
            <li><a href="{{ SITEURL }}/tags.html">Tags</a></li>
            <li><a href="{{ SITEURL }}/categories.html">Categorías</a></li>
            {% for p in pages %}
            <li><a href="{{ SITEURL }}/{{ p.url }}">{{ p.title }}</a></li>
            {% endfor %}
          </ul>
        </nav>
        <form class="nav-search" role="search" action="{{ SITEURL }}/buscar/" method="get" autocomplete="off">
          <input type="search" name="q" placeholder="Buscar producto…" aria-label="Buscar productos" class="nav-search-input" />
          <button type="submit" class="nav-search-btn" aria-label="Buscar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </form>
      </div>
    </header>

    <main id="main-content">{% block content %}{% endblock %}</main>

    <footer id="site-footer">
      <div class="container">
        <p>© {{ SITENAME }} — Todos los derechos reservados</p>
      </div>
    </footer>
  </body>
</html>
